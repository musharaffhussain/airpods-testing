<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AirPods AR Viewer</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #f5f5f5;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      background: transparent;
    }

    .info-card {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 250px;
      background: rgba(255, 255, 255, 0.95);
      padding: 18px;
      border-radius: 18px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
      z-index: 10;
    }

    .info-card h2 {
      margin-bottom: 12px;
      font-size: 22px;
    }

    .info-card p {
      margin: 8px 0;
      font-size: 15px;
    }

    .ar-btn {
      background: #000;
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 14px 24px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="info-card">
    <h2>🎧 AirPods</h2>
    <p>🔋 Battery: Up to 6 Hours</p>
    <p>🎵 Spatial Audio</p>
    <p>📶 Bluetooth 5.3</p>
    <p>⭐ Rating: 4.8 / 5</p>
  </div>

  <model-viewer
    src="./object_0.glb"
    alt="3D AirPods Model"

    camera-controls
    auto-rotate
    auto-rotate-delay="0"
    rotation-per-second="30deg"

    shadow-intensity="1"
    exposure="1"

    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="fixed"

    scale="0.005 0.005 0.005">

    <button slot="ar-button" class="ar-btn">
      🎧 View in AR
    </button>

  </model-viewer>

</body>
</html>
